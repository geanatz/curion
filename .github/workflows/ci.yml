name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege: the workflow only needs to read the repository contents.
# No write permissions, no token scopes beyond what is strictly necessary.
permissions: contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ["20", "22"]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test
